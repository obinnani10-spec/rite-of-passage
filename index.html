const BPM_MIN = 70, BPM_MAX = 124;

// temperature → color along an indigo→teal→gold→ember ramp
function tempColor(t) {
  const stops = [
    [0.0, [22, 30, 52]],   // indigo
    [0.3, [62, 92, 107]],  // cold teal
    [0.5, [120, 140, 90]], // shifting
    [0.65, [201, 162, 39]],// gold
    [0.85, [200, 90, 40]], // ember
    [1.0, [180, 40, 28]],  // deep red
  ];
  let a = stops[0], b = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i][0] && t <= stops[i + 1][0]) { a = stops[i]; b = stops[i + 1]; break; }
  }
  const span = b[0] - a[0] || 1;
  const f = (t - a[0]) / span;
  const c = a[1].map((v, i) => Math.round(v + (b[1][i] - v) * f));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function RiteOfPassageRoadmap() {
  const [open, setOpen] = React.useState(null);
  const [actFilter, setActFilter] = React.useState("ALL");

  const visible = React.useMemo(
    () => CUES.filter((c) => actFilter === "ALL" || c.act === actFilter),
    [actFilter]
  );

  return (
    <div style={S.root}>
      <style>{CSS}</style>

      {/* HERO */}
      <header style={S.hero}>
        <div style={S.eyebrow}>AFROBEAT SCORE · CUE ROADMAP · VERSION I</div>
        <h1 style={S.h1}>
          Rite of <span style={S.h1accent}>Passage</span>
        </h1>
        <p style={S.tagline}>
          Sixteen cues. One man crossing from a cold London platform to
          ancestral fire. The colors below are <em>emotional temperature</em> —
          indigo is exile, ember is belonging. The ribbon on the left rises and
          falls with tempo.
        </p>

        <div style={S.legendRow}>
          <TempScale />
          <div style={S.filterGroup}>
            {["ALL", "I", "II", "III"].map((a) => (
              <button
                key={a}
                onClick={() => setActFilter(a)}
                className="actBtn"
                style={{
                  ...S.actBtn,
                  ...(actFilter === a ? S.actBtnOn : {}),
                  borderColor: a === "ALL" ? "#7a7a82" : ACTS[a].tint,
                }}
              >
                {a === "ALL" ? "All Acts" : `Act ${a}`}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* TIMELINE */}
      <main style={S.timeline}>
        {visible.map((c, i) => {
          const isOpen = open === c.n;
          const accent = tempColor(c.temp);
          const heightPct = ((c.bpm - BPM_MIN) / (BPM_MAX - BPM_MIN)) * 100;
          const prevAct = i > 0 ? visible[i - 1].act : null;
          const showActHeader = c.act !== prevAct;

          return (
            <React.Fragment key={c.n}>
              {showActHeader && (
                <div style={{ ...S.actHeader, color: ACTS[c.act].tint }}>
                  <span style={{ ...S.actDot, background: ACTS[c.act].tint }} />
                  {ACTS[c.act].label}
                </div>
              )}

              <article
                className="cueCard"
                style={{ ...S.card, borderLeft: `3px solid ${accent}` }}
              >
                {/* tempo ribbon */}
                <div style={S.ribbonCol} title={`${c.bpm} BPM`}>
                  <div style={S.ribbonTrack}>
                    <div
                      style={{
                        ...S.ribbonFill,
                        height: `${heightPct}%`,
                        background: accent,
                      }}
                    />
                  </div>
                  <div style={S.bpmLabel}>{c.bpm}</div>
                  <div style={S.bpmUnit}>BPM</div>
                </div>

                {/* header (tap target) */}
                <button
                  className="cueHead"
                  onClick={() => setOpen(isOpen ? null : c.n)}
                  style={S.cueHead}
                  aria-expanded={isOpen}
                >
                  <div style={S.cueNo} >
                    <span style={{ color: accent }}>{String(c.n).padStart(2, "0")}</span>
                  </div>
                  <div style={S.cueHeadMain}>
                    <h3 style={S.cueTitle}>{c.title}</h3>
                    <p style={S.cueMoment}>{c.moment}</p>
                    <div style={S.swatchRow}>
                      {c.palette.map((p, k) => (
                        <span key={k} style={{ ...S.swatch, background: p }} />
                      ))}
                      <span style={S.metaPill}>{c.dur}</span>
                    </div>
                  </div>
                  <div style={{ ...S.chev, transform: isOpen ? "rotate(90deg)" : "none", color: accent }}>
                    ▸
                  </div>
                </button>

                {/* expanded body */}
                {isOpen && (
                  <div className="cueBody" style={S.body}>
                    <Section label="The feeling" accent={accent}>
                      {c.feel}
                    </Section>
                    <Section label="Artistic direction" accent={accent}>
                      {c.direction}
                    </Section>
                    <div className="grid2" style={S.grid2}>
                      <div>
                        <div style={{ ...S.miniLabel, color: accent }}>Instrumentation</div>
                        <ul style={S.instList}>
                          {c.instruments.map((ins, k) => (
                            <li key={k} style={S.instItem}>{ins}</li>
                          ))}
                        </ul>
                      </div>
                      <div>
                        <div style={{ ...S.miniLabel, color: accent }}>Reference / sample</div>
                        <div style={S.sampleBox}>{c.sample}</div>
                        <div style={{ ...S.miniLabel, color: accent, marginTop: 14 }}>
                          Culture & impact
                        </div>
                        <p style={S.culture}>{c.culture}</p>
                      </div>
                    </div>
                  </div>
                )}
              </article>
            </React.Fragment>
          );
        })}
      </main>

      <footer style={S.footer}>
        <div style={S.footRule} />
        <p style={S.footText}>
          The score evolves exactly as Akah does — visitor, to survivor, to a man
          who belongs in both worlds.
        </p>
      </footer>
    </div>
  );
}

function Section({ label, accent, children }) {
  return (
    <div style={S.section}>
      <div style={{ ...S.miniLabel, color: accent }}>{label}</div>
      <p style={S.sectionText}>{children}</p>
    </div>
  );
}

function TempScale() {
  return (
    <div style={S.scaleWrap}>
      <span style={S.scaleEnd}>Exile</span>
      <div style={S.scaleBar} />
      <span style={S.scaleEnd}>Belonging</span>
    </div>
  );
}
